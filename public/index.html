<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加密與憑證原理 | Encryption & Certificates</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <!-- Topic Switcher -->
  <nav class="topic-switcher" id="topicSwitcher">
    <button class="topic-tab active" data-topic="certificate">
      <span class="topic-icon">📜</span>
      <span class="topic-label">
        <span class="zh">憑證原理</span>
        <span class="en">Certificates</span>
      </span>
    </button>
    <button class="topic-tab" data-topic="symmetric">
      <span class="topic-icon">🔐</span>
      <span class="topic-label">
        <span class="zh">對稱式加密</span>
        <span class="en">Symmetric Encryption</span>
      </span>
    </button>
    <button class="topic-tab" data-topic="asymmetric">
      <span class="topic-icon">🔓</span>
      <span class="topic-label">
        <span class="zh">非對稱式加密</span>
        <span class="en">Asymmetric Encryption</span>
      </span>
    </button>
  </nav>

  <!-- Progress Bar -->
  <header class="progress-bar" id="progressBar">
    <!-- Dynamically generated by app.js -->
  </header>

  <!-- Main Animation Area -->
  <main class="stage" id="stageArea">
    <!-- Dynamically generated by app.js -->
  </main>

  <!-- Controls -->
  <footer class="controls">
    <button class="btn btn-prev" id="btnPrev" disabled>
      <span class="zh">← 上一步</span>
      <span class="en">← Previous</span>
    </button>
    <div class="step-indicator" id="stepIndicator">1 / 1</div>
    <button class="btn btn-auto" id="btnAuto">
      <span class="zh">▶ 自動播放</span>
      <span class="en">▶ Auto Play</span>
    </button>
    <button class="btn btn-next" id="btnNext">
      <span class="zh">下一步 →</span>
      <span class="en">Next →</span>
    </button>
  </footer>

  <script src="js/scene1-keygen.js"></script>
  <script src="js/scene2-csr.js"></script>
  <script src="js/scene3-ca.js"></script>
  <script src="js/scene4-cert.js"></script>
  <script src="js/scene5-verify.js"></script>
  <script src="js/sym-scene1-intro.js"></script>
  <script src="js/sym-scene2-process.js"></script>
  <script src="js/sym-scene3-algorithms.js"></script>
  <script src="js/sym-scene4-modes.js"></script>
  <script src="js/asym-scene1-concept.js"></script>
  <script src="js/asym-scene2-encrypt.js"></script>
  <script src="js/asym-scene3-signature.js"></script>
  <script src="js/asym-scene4-algorithms.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
